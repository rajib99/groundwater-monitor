x-backend-env: &backend-env
  DATABASE_URL:          postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  REDIS_URL:             redis://redis:6379/0
  SECRET_KEY:            ${SECRET_KEY:?SECRET_KEY must be set}
  ANTHROPIC_API_KEY:     ${ANTHROPIC_API_KEY:-}
  ENVIRONMENT:           production
  LOG_LEVEL:             ${LOG_LEVEL:-INFO}
  BACKEND_CORS_ORIGINS:  ${BACKEND_CORS_ORIGINS:?BACKEND_CORS_ORIGINS must be set}

services:

  # ── Init: run Alembic migrations before backend starts ────────────────────
  migrate:
    container_name: gwm-migrate
    image: ${REGISTRY}/gwm-backend:${IMAGE_TAG:-latest}
    command: ["alembic", "upgrade", "head"]
    restart: "no"
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
    networks: [gwm_net]

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    container_name: gwm-backend
    image: ${REGISTRY}/gwm-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      <<: *backend-env
    volumes:
      - ml_models:/app/models
      - reports_data:/app/reports
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks: [gwm_net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Next.js frontend ───────────────────────────────────────────────────────
  frontend:
    container_name: gwm-frontend
    image: ${REGISTRY}/gwm-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks: [gwm_net]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    container_name: gwm-nginx
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks: [gwm_net]

  # ── TimescaleDB ───────────────────────────────────────────────────────────
  postgres:
    container_name: gwm-postgres
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:?POSTGRES_DB must be set}
      POSTGRES_USER:     ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [gwm_net]

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    container_name: gwm-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
        --appendonly yes
        --appendfsync everysec
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [gwm_net]

  # ── Simulator ─────────────────────────────────────────────────────────────
  simulator:
    container_name: gwm-simulator
    image: ${REGISTRY}/gwm-simulator:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL:         postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      API_URL:              http://backend:8000
      API_KEY:              ${API_KEYS:-}
      SIMULATOR_INTERVAL_S: ${SIMULATOR_INTERVAL_S:-30}
      ANOMALY_PROB:         ${ANOMALY_PROB:-0.05}
      LOG_LEVEL:            ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks: [gwm_net]

volumes:
  postgres_data:
  redis_data:
  ml_models:
  reports_data:

networks:
  gwm_net:
    driver: bridge
