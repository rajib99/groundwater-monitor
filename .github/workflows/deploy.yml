name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_build:
        description: "Skip image build (re-deploy current latest)"
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ${{ secrets.DOCKERHUB_USERNAME }}
  DEPLOY_DIR: /srv/apps/groundwater-monitor

jobs:
  # ── Job 1: compute SHA once so all matrix jobs share the same tag ────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      short-sha: ${{ steps.sha.outputs.short }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

  # ── Job 2: build all four service images in parallel ─────────────────────────
  build:
    name: Build & Push ${{ matrix.service }}
    if: ${{ !inputs.skip_build }}
    needs: prepare
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false   # push all images even if one fails
      matrix:
        include:
          - service:    backend
            context:    ./backend
            dockerfile: ./docker/Dockerfile.backend
            build-args: ""

          - service:    frontend
            context:    ./frontend
            dockerfile: ./docker/Dockerfile.frontend
            build-args: NEXT_PUBLIC_API_URL=http://backend:8000

          - service:    simulator
            context:    ./ml
            dockerfile: ./docker/Dockerfile.simulator
            build-args: ""

          - service:    ml
            context:    ./ml
            dockerfile: ./docker/Dockerfile.ml
            build-args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/gwm-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context:    ${{ matrix.context }}
          file:       ${{ matrix.dockerfile }}
          push:       true
          build-args: ${{ matrix.build-args }}
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.service }}

  # ── Job 3: deploy to VPS ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [prepare, build]
    # Run deploy even when build was skipped (manual re-deploy via workflow_dispatch)
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose file and nginx config to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "docker-compose.prod.yml,nginx/"
          target:   ${{ env.DEPLOY_DIR }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:         ${{ secrets.VPS_HOST }}
          username:     ${{ secrets.VPS_USER }}
          key:          ${{ secrets.VPS_SSH_KEY }}
          script_stop:  true
          script: |
            set -euo pipefail

            cd "${{ env.DEPLOY_DIR }}"

            export REGISTRY="${{ env.REGISTRY }}"
            export IMAGE_TAG="sha-${{ needs.prepare.outputs.short-sha }}"

            COMPOSE="docker compose -f docker-compose.prod.yml"

            echo "▶ Pulling $REGISTRY/gwm-*:$IMAGE_TAG"
            $COMPOSE pull --quiet

            echo "▶ Running database migrations"
            $COMPOSE run --rm migrate

            echo "▶ Bringing up services"
            $COMPOSE up -d --remove-orphans

            echo "▶ Restarting nginx to pick up new upstream container IPs"
            $COMPOSE restart nginx

            echo "▶ Waiting for backend to be healthy"
            deadline=120
            elapsed=0
            until docker inspect --format='{{.State.Health.Status}}' gwm-backend 2>/dev/null | grep -q "healthy"; do
              if [ "$elapsed" -ge "$deadline" ]; then
                echo "✗ Backend not healthy after ${deadline}s"
                docker logs gwm-backend --tail 50
                exit 1
              fi
              sleep 5
              elapsed=$((elapsed + 5))
            done
            echo "✓ Backend healthy after ${elapsed}s"

            echo "▶ Retraining ML model (non-fatal)"
            $COMPOSE run --rm --profile tools ml-trainer || echo "⚠ ML training failed — skipping"

            echo "▶ Health status"
            docker inspect --format='{{.Name}}: {{.State.Health.Status}}' \
              gwm-backend gwm-frontend 2>/dev/null || true

            echo "▶ Pruning old images (>24 h)"
            docker image prune -f --filter "until=24h"

            echo "✓ Deploy complete: $IMAGE_TAG"

      - name: Write deployment summary
        if: always()
        env:
          SHORT_SHA: ${{ needs.prepare.outputs.short-sha }}
          JOB_STATUS: ${{ job.status }}
        run: |
          {
            echo "## Deployment $( [ "$JOB_STATUS" = "success" ] && echo "✅ succeeded" || echo "❌ failed" )"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Image tag** | \`sha-${SHORT_SHA}\` |"
            echo "| **Commit** | [\`${SHORT_SHA}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |"
            echo "| **Branch** | \`${{ github.ref_name }}\` |"
            echo "| **Triggered by** | @${{ github.actor }} |"
            echo "| **Workflow run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"
