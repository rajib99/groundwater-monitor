name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_build:
        description: "Skip image build (re-deploy current latest)"
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── Job 1: build all service images ───────────────────────────────────────
  build:
    name: Build ${{ matrix.service }}
    if: ${{ !inputs.skip_build }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false   # build all images even if one fails
      matrix:
        include:
          - service:    backend
            context:    ./backend
            dockerfile: ./docker/Dockerfile.backend
            build-args: ""

          - service:    frontend
            context:    ./frontend
            dockerfile: ./docker/Dockerfile.frontend
            # API URL used by server-side rewrites inside the container
            build-args: NEXT_PUBLIC_API_URL=http://backend:8000

          - service:    simulator
            context:    ./ml
            dockerfile: ./docker/Dockerfile.simulator
            build-args: ""

          - service:    ml
            context:    ./ml
            dockerfile: ./docker/Dockerfile.ml
            build-args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/gwm-${{ matrix.service }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context:    ${{ matrix.context }}
          file:       ${{ matrix.dockerfile }}
          push:       true
          build-args: ${{ matrix.build-args }}
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          # Per-service cache buckets so services don't share a cache
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.service }}

  # ── Job 2: deploy to Hetzner VPS ──────────────────────────────────────────
  deploy:
    name: Deploy to production
    needs: [build]
    # Allow deploy even if build was skipped (manual re-deploy)
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest
    environment: production   # requires manual approval if configured in GitHub

    concurrency:
      group: production-deploy
      cancel-in-progress: false   # never cancel an in-progress deploy

    steps:
      - name: Checkout (for compose file)
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_SHA: ${{ github.sha }}
          REGISTRY:  ${{ env.REGISTRY }}
        with:
          host:     ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key:      ${{ secrets.HETZNER_SSH_KEY }}
          port:     ${{ secrets.HETZNER_PORT || 22 }}
          envs:     IMAGE_SHA,REGISTRY
          script: |
            set -euo pipefail

            DEPLOY_DIR=/opt/groundwater-monitor
            COMPOSE="docker compose -f $DEPLOY_DIR/docker-compose.prod.yml"

            echo "==> Pulling latest config from git"
            cd "$DEPLOY_DIR"
            git fetch --depth=1 origin main
            git reset --hard origin/main

            echo "==> Updating image tag to ${IMAGE_SHA}"
            # Update IMAGE_TAG in .env; create the line if it doesn't exist
            if grep -q '^IMAGE_TAG=' .env; then
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_SHA}|" .env
            else
              echo "IMAGE_TAG=${IMAGE_SHA}" >> .env
            fi

            echo "==> Logging in to GHCR"
            echo "${{ secrets.GHCR_PAT }}" \
              | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            echo "==> Pulling new images"
            $COMPOSE pull --quiet

            echo "==> Running database migrations"
            $COMPOSE run --rm migrate

            echo "==> Restarting services"
            $COMPOSE up -d --remove-orphans --wait --wait-timeout 120

            echo "==> Verifying health"
            docker inspect --format='{{.Name}}: {{.State.Health.Status}}' \
              gwm-backend gwm-frontend 2>/dev/null || true

            echo "==> Pruning old images (>24h)"
            docker image prune -f --filter "until=24h"

            echo "==> Deploy complete: ${IMAGE_SHA}"

  # ── Job 3: notify on failure ──────────────────────────────────────────────
  notify-failure:
    name: Notify on failure
    needs: [build, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Report failure
        run: |
          echo "::error::Deployment failed for commit ${{ github.sha }}"
          echo "Build:  ${{ needs.build.result }}"
          echo "Deploy: ${{ needs.deploy.result }}"
          # Add Slack/email webhook here if desired
