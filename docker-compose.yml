# Development / local docker-compose.
# Start everything with a single command:
#
#   cp .env.example .env   # fill in values
#   docker-compose up --build
#
# The stack boots in order:
#   postgres + redis  →  migrate  →  seed  →  backend  →  frontend + simulator

name: groundwater-monitor

# The backend image is built once and reused by migrate / seed / backend.
x-backend-build: &backend-build
  build:
    context: ./backend
    dockerfile: ../docker/Dockerfile.backend
  image: gwm-backend:local

# Env injected into every backend-family container
x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  REDIS_URL: redis://redis:6379/0
  SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  ENVIRONMENT: ${ENVIRONMENT:-development}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
  API_KEYS: ${API_KEYS:-}

services:

  # ── Init 1: run Alembic migrations ────────────────────────────────────────
  migrate:
    <<: *backend-build
    container_name: gwm-migrate
    command: ["alembic", "upgrade", "head"]
    restart: "no"
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

  # ── Init 2: seed default sites (no-op if already populated) ───────────────
  seed:
    <<: *backend-build
    container_name: gwm-seed
    command: ["python", "seed.py"]
    restart: "no"
    environment:
      <<: *backend-env
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks: [internal]

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    <<: *backend-build
    container_name: gwm-backend
    restart: unless-stopped
    environment:
      <<: *backend-env
    volumes:
      - ml_models:/app/models
      - reports_data:/app/reports
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks: [internal]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Next.js frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    image: gwm-frontend:local
    container_name: gwm-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks: [internal]

  # ── TimescaleDB (PostgreSQL + time-series extension) ─────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: gwm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [internal]

  # ── Redis (caching + rate limiting + pub-sub) ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gwm-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  # ── Live feed simulator ────────────────────────────────────────────────────
  simulator:
    build:
      context: ./ml
      dockerfile: ../docker/Dockerfile.simulator
    container_name: gwm-simulator
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      API_URL: http://backend:8000
      API_KEY: ${API_KEYS:-}          # pass first key (or empty if auth disabled)
      SIMULATOR_INTERVAL_S: ${SIMULATOR_INTERVAL_S:-30}
      ANOMALY_PROB: ${ANOMALY_PROB:-0.05}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      backend:
        condition: service_healthy
    networks: [internal]

  # ── ML worker (on-demand; run via: docker-compose run --rm ml) ───────────
  ml:
    build:
      context: ./ml
      dockerfile: ../docker/Dockerfile.ml
    container_name: gwm-ml
    restart: "no"
    profiles: ["ml"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ml_models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

volumes:
  postgres_data:
  redis_data:
  ml_models:
  reports_data:

networks:
  internal:
    driver: bridge
